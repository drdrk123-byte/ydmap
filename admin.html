<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용답동네 발견 지도 - 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --navy:#1B2A4A; --coral:#FF6F59; --gold:#F2B134; --sage:#7FA99B;
    --paper:#FBF7EE; --ink:#26324A; --line:rgba(27,42,74,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Pretendard Variable', Pretendard, sans-serif;
    background:var(--paper); color:var(--ink); min-height:100vh;
  }
  header{
    background:var(--navy); color:var(--paper);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
  }
  header h1{ font-family:'Gowun Batang', serif; font-size:19px; margin:0; }
  header button{
    background:none; border:1px solid rgba(251,247,238,0.4); color:var(--paper);
    border-radius:8px; padding:8px 14px; font-size:12.5px; cursor:pointer; font-family:inherit;
  }

  #loginScreen{
    max-width:340px; margin:80px auto; background:white; padding:28px;
    border-radius:14px; box-shadow:0 6px 18px rgba(27,42,74,0.1);
  }
  #loginScreen h2{ font-family:'Gowun Batang', serif; color:var(--navy); margin-top:0; }
  #loginScreen input{
    width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:8px;
    margin-bottom:12px; font-family:inherit; font-size:13.5px;
  }
  #loginScreen button{
    width:100%; background:var(--coral); color:white; border:none; border-radius:8px;
    padding:12px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  #loginMsg{ font-size:12.5px; color:var(--coral); min-height:16px; margin-top:8px; }

  main{ max-width:920px; margin:0 auto; padding:24px; display:none; }
  main.show{ display:block; }

  .section-title{
    font-family:'Gowun Batang', serif; color:var(--navy); font-size:17px;
    margin:28px 0 12px; display:flex; align-items:center; gap:8px;
  }
  .count-badge{
    background:var(--coral); color:white; font-size:11px; font-weight:700;
    border-radius:999px; padding:2px 9px;
  }

  .item{
    background:white; border:1px solid var(--line); border-radius:10px;
    padding:16px 18px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start;
    flex-wrap:wrap;
  }
  .item .info{ flex:1; min-width:220px; }
  .cat-badge{
    display:inline-block; font-size:10.5px; font-weight:700; color:white;
    padding:3px 8px; border-radius:3px; margin-bottom:6px;
  }
  .item h3{ font-family:'Gowun Batang', serif; margin:0 0 6px; color:var(--navy); font-size:15.5px; }
  .item p{ margin:0 0 8px; font-size:13px; line-height:1.55; color:rgba(38,50,74,0.85); }
  .item .meta{ font-size:11.5px; color:rgba(38,50,74,0.5); }
  .item .actions{ display:flex; gap:8px; flex:none; }
  .btn{
    border:none; border-radius:7px; padding:9px 14px; font-size:12.5px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }
  .btn-approve{ background:var(--sage); color:white; }
  .btn-reject{ background:transparent; color:var(--coral); border:1.5px solid var(--coral); }
  .btn-delete{ background:transparent; color:rgba(38,50,74,0.5); border:1.5px solid var(--line); }

  .empty{ color:rgba(38,50,74,0.5); font-size:13px; padding:20px 0; }
</style>
</head>
<body>

<header>
  <h1>용답동네 발견 지도 · 관리자</h1>
  <button id="logoutBtn" style="display:none;">로그아웃</button>
</header>

<div id="loginScreen">
  <h2>선생님 로그인</h2>
  <input type="email" id="loginEmail" placeholder="이메일">
  <input type="password" id="loginPassword" placeholder="비밀번호">
  <button id="loginBtn">로그인</button>
  <div id="loginMsg"></div>
</div>

<main id="main">
  <div class="section-title">승인 대기 중 <span class="count-badge" id="pendingCount">0</span></div>
  <div id="pendingList"><div class="empty">불러오는 중...</div></div>

  <div class="section-title">지도에 표시 중인 장소 <span class="count-badge" id="approvedCount">0</span></div>
  <div id="approvedList"><div class="empty">불러오는 중...</div></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, query, where, orderBy, onSnapshot,
    doc, updateDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ index.html과 동일한 Firebase 설정값을 넣어주세요.
  const firebaseConfig = {
    apiKey: "AIzaSyCbZyPC3L_59JNkpFpvk67aRdRzq5JPTes",
    authDomain: "ydmap-7973b.firebaseapp.com",
    projectId: "ydmap-7973b",
    storageBucket: "ydmap-7973b.firebasestorage.app",
    messagingSenderId: "414361733109",
    appId: "1:414361733109:web:2c0e685d959197c5fdc2bc"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const placesCol = collection(db, "villagePlaces");

  const CATEGORY_COLORS = { "공공기관":"#1B2A4A", "맛집":"#FF6F59", "명소":"#F2B134", "기타":"#7FA99B" };

  function escapeHTML(str){
    return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  // ---- 로그인 ----
  const loginScreen = document.getElementById('loginScreen');
  const main = document.getElementById('main');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginMsg = document.getElementById('loginMsg');

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    loginMsg.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err){
      loginMsg.textContent = '로그인에 실패했어요. 이메일/비밀번호를 확인해주세요.';
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if (user){
      loginScreen.style.display = 'none';
      main.classList.add('show');
      logoutBtn.style.display = 'inline-block';
      subscribeData();
    } else {
      loginScreen.style.display = 'block';
      main.classList.remove('show');
      logoutBtn.style.display = 'none';
    }
  });

  // ---- 데이터 ----
  let unsubs = [];
  function subscribeData(){
    unsubs.forEach(u => u());
    unsubs = [];

    const pendingQ = query(placesCol, where('status','==','pending'), orderBy('createdAt','asc'));
    unsubs.push(onSnapshot(pendingQ, (snap) => {
      const list = document.getElementById('pendingList');
      document.getElementById('pendingCount').textContent = snap.size;
      if (snap.empty){ list.innerHTML = '<div class="empty">대기 중인 등록이 없어요.</div>'; return; }
      list.innerHTML = '';
      snap.forEach(d => list.appendChild(renderPendingItem(d.id, d.data())));
    }));

    const approvedQ = query(placesCol, where('status','==','approved'), orderBy('createdAt','desc'));
    unsubs.push(onSnapshot(approvedQ, (snap) => {
      const list = document.getElementById('approvedList');
      document.getElementById('approvedCount').textContent = snap.size;
      if (snap.empty){ list.innerHTML = '<div class="empty">아직 표시 중인 장소가 없어요.</div>'; return; }
      list.innerHTML = '';
      snap.forEach(d => list.appendChild(renderApprovedItem(d.id, d.data())));
    }));
  }

  function baseItem(id, data){
    const el = document.createElement('div');
    el.className = 'item';
    const color = CATEGORY_COLORS[data.category] || CATEGORY_COLORS['기타'];
    el.innerHTML = `
      <div class="info">
        <span class="cat-badge" style="background:${color}">${escapeHTML(data.category)}</span>
        <h3>${escapeHTML(data.name)}</h3>
        <p>${escapeHTML(data.description)}</p>
        <div class="meta">${data.reporter ? escapeHTML(data.reporter) + ' · ' : ''}위도 ${Number(data.lat).toFixed(5)}, 경도 ${Number(data.lng).toFixed(5)}</div>
      </div>
      <div class="actions"></div>
    `;
    return el;
  }

  function renderPendingItem(id, data){
    const el = baseItem(id, data);
    const actions = el.querySelector('.actions');

    const approveBtn = document.createElement('button');
    approveBtn.className = 'btn btn-approve';
    approveBtn.textContent = '승인';
    approveBtn.addEventListener('click', async () => {
      approveBtn.disabled = true;
      await updateDoc(doc(db, 'villagePlaces', id), { status: 'approved', approvedAt: serverTimestamp() });
    });

    const rejectBtn = document.createElement('button');
    rejectBtn.className = 'btn btn-reject';
    rejectBtn.textContent = '거절';
    rejectBtn.addEventListener('click', async () => {
      if (!confirm('이 등록을 거절하고 삭제할까요?')) return;
      await deleteDoc(doc(db, 'villagePlaces', id));
    });

    actions.appendChild(approveBtn);
    actions.appendChild(rejectBtn);
    return el;
  }

  function renderApprovedItem(id, data){
    const el = baseItem(id, data);
    const actions = el.querySelector('.actions');

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn btn-delete';
    deleteBtn.textContent = '지도에서 내리기';
    deleteBtn.addEventListener('click', async () => {
      if (!confirm('이 장소를 지도에서 삭제할까요?')) return;
      await deleteDoc(doc(db, 'villagePlaces', id));
    });

    actions.appendChild(deleteBtn);
    return el;
  }
</script>
</body>
</html>
